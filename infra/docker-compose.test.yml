services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_DB: growthos
      POSTGRES_USER: growthos
      POSTGRES_PASSWORD: growthos
    ports:
      - "55432:5432"
    volumes:
      - pgdata-test:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "56379:6379"

  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "59000:9000"
      - "59001:9001"
    environment:
      MINIO_ROOT_USER: growthos
      MINIO_ROOT_PASSWORD: growthos
    volumes:
      - miniodata-test:/data

volumes:
  pgdata-test: {}
  miniodata-test: {}
